<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>USD ⇄ IQD Converter</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
}

.card{

width:100%;
max-width:420px;

background:rgba(30,41,59,.85);

backdrop-filter:blur(10px);

padding:25px;

border-radius:18px;

box-shadow:
0 10px 25px rgba(0,0,0,.4),
inset 0 1px 0 rgba(255,255,255,.05);

}

h2{

text-align:center;

margin-bottom:20px;

font-weight:600;

letter-spacing:.5px;

}

label{

color:#94a3b8;

font-size:14px;

display:block;

margin-bottom:6px;

}

input{

width:100%;

padding:14px;

border-radius:10px;

border:1px solid #1e293b;

background:#020617;

color:white;

font-size:18px;

outline:none;

transition:.2s;

}

input:focus{

border:1px solid #38bdf8;

box-shadow:0 0 0 2px rgba(56,189,248,.2);

}

.result{

background:#020617;

padding:18px;

border-radius:12px;

font-size:22px;

text-align:center;

margin-bottom:18px;

font-weight:600;

letter-spacing:.5px;

border:1px solid #1e293b;

}

@media (max-width:380px){

.card{

padding:18px;

}

input{

font-size:16px;

padding:12px;

}

.result{

font-size:18px;

padding:14px;

}

}

</style>

</head>

<body>

<div class="card">

<h2>USD ⇄ IQD</h2>

<label>Price of 100$ (IQD)</label>
<input id="rate" type="number">

<label>USD Amount</label>
<input id="usd" type="number">

<div class="result" id="iqd">
0 IQD
</div>

<label>IQD Amount</label>
<input id="iqdInput" type="number">

<div class="result" id="usdResult">
0 USD
</div>

</div>

<script>

let rate=document.getElementById("rate");
let usd=document.getElementById("usd");
let iqd=document.getElementById("iqd");
let iqdInput=document.getElementById("iqdInput");
let usdResult=document.getElementById("usdResult");

rate.value=localStorage.getItem("rate") || 155000;

function convert(){

let price1=rate.value/100;

iqd.innerHTML=
(usd.value*price1 || 0).toLocaleString()
+" IQD";

usdResult.innerHTML=
(iqdInput.value/price1 || 0).toFixed(2)
+" USD";

localStorage.setItem("rate",rate.value);

}

rate.oninput=convert;
usd.oninput=convert;
iqdInput.oninput=convert;

convert();

</script>

</body>
</html>
